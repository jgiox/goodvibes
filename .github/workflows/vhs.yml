name: VHS Demo

on:
  push:
    branches: [main]
    # ponytail: path filter prevents the GIF commit from re-triggering this workflow
    paths:
      - 'scripts/demo.tape'

jobs:
  vhs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write  # required by git-auto-commit-action@v7 to push the GIF

    steps:
      - uses: actions/checkout@v7

      - name: Install VHS and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg ttyd gpg
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://repo.charm.sh/apt/gpg.key | \
            sudo gpg --dearmor -o /etc/apt/keyrings/charm.gpg
          echo "deb [signed-by=/etc/apt/keyrings/charm.gpg] https://repo.charm.sh/apt/ * *" | \
            sudo tee /etc/apt/sources.list.d/charm.list > /dev/null
          sudo apt-get update && sudo apt-get install -y vhs

      - name: Record demo
        continue-on-error: true
        run: |
          echo "vhs $(vhs --version 2>&1)"
          mkdir -p docs
          cd scripts && vhs demo.tape 2>&1
          echo "--- vhs exit: $? ---"
          ls -la ../docs/ 2>&1 || true

      - uses: stefanzweifel/git-auto-commit-action@v7.1.0
        if: always()
        with:
          commit_message: 'chore(demo): regenerate demo.gif'
          file_pattern: 'docs/demo.gif'
