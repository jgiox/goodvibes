name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-npm:
    name: npm tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: packages/npm/package-lock.json

      - name: Install dependencies
        working-directory: packages/npm
        run: npm ci

      - name: Build
        working-directory: packages/npm
        run: npm run build

      - name: Test
        working-directory: packages/npm
        run: npm test

  test-pip:
    name: pip tests (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python }}

      - name: Test
        working-directory: packages/pip
        run: uv run --extra dev pytest tests/ -x -q

  smoke-test:
    name: Phase smoke harness
    runs-on: ubuntu-latest
    needs: [test-npm, test-pip]
    steps:
      - uses: actions/checkout@v7

      - name: Run verify-phase5.sh
        run: bash scripts/verify-phase5.sh --quick

  check-stamps:
    name: Version stamps in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Check version stamps are in sync
        run: |
          NPM_VER=$(grep '"version"' packages/npm/package.json | head -1 | sed 's/.*"version": "\(.*\)".*/\1/')
          PIP_VER=$(grep '^version' packages/pip/pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          TPL_VER=$(grep '^# goodvibes: v' templates/CLAUDE.md | sed 's/# goodvibes: v//')

          echo "npm:      $NPM_VER"
          echo "pip:      $PIP_VER"
          echo "template: $TPL_VER"

          if [ "$NPM_VER" != "$PIP_VER" ] || [ "$NPM_VER" != "$TPL_VER" ]; then
            echo ""
            echo "ERROR: Version stamps are out of sync."
            echo "Fix: update templates/CLAUDE.md header to '# goodvibes: v$NPM_VER'"
            echo "Fix: update packages/pip/pyproject.toml version to match packages/npm/package.json"
            exit 1
          fi
          echo "All stamps in sync: v$NPM_VER"
