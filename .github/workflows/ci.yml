name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-npm:
    name: npm tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: packages/npm/package-lock.json

      - name: Install dependencies
        working-directory: packages/npm
        run: npm ci

      - name: Build
        working-directory: packages/npm
        run: npm run build

      - name: Test
        working-directory: packages/npm
        run: npm test

  test-pip:
    name: pip tests (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v5

      - name: Test
        working-directory: packages/pip
        run: uv run pytest tests/ -x -q

  smoke-test:
    name: Phase smoke harness
    runs-on: ubuntu-latest
    needs: [test-npm, test-pip]
    steps:
      - uses: actions/checkout@v7

      - name: Run verify-phase3.sh
        run: bash scripts/verify-phase3.sh --quick
