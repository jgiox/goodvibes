name: Publish pip package

on:
  push:
    tags:
      - 'pip-v*'   # trigger: git tag pip-v1.0.0 && git push origin pip-v1.0.0
  workflow_dispatch:  # manual button in GitHub Actions UI

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release  # matches PyPI trusted publisher environment name
    permissions:
      contents: read
      id-token: write  # required for OIDC trusted publishing — no API token in repo
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Test
        working-directory: packages/pip
        run: uv run --extra dev pytest tests/ -x -q

      - name: Build wheel
        working-directory: packages/pip
        run: uv build --no-sources

      - name: Verify wheel name (PKG-01 — goodvibes-cli)
        run: test -f packages/pip/dist/goodvibes_cli-*.whl

      - name: Publish to PyPI
        working-directory: packages/pip
        run: uv publish --trusted-publishing always

  smoke-test:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Wait for registry propagation
        run: sleep 30

      - name: Install from PyPI
        run: uv tool install goodvibes-cli

      - name: Smoke test
        run: |
          TMPDIR=$(mktemp -d)
          cd $TMPDIR
          goodvibes init --dry-run 2>&1 | tee /tmp/gv-out.txt
          grep -q "CLAUDE.md" /tmp/gv-out.txt
